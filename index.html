<body></body>
<script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>
<script>
  /* global nn */
  
  document.body.style.background = '#04040f'

  function draw () {
    if (nn.mouseDown) {
    let x = nn.mouseX
    let y = nn.mouseY
    let hue = nn.random(360)
    let star = nn.create('div')
    star.content('⭐️', '✨', '💫')
      .css('user-select', 'none')
      .css('font-size', nn.random(10, 30) + 'px')
      .css('transition', 'top 3s ease-in, opacity 3s ease-in')
      .hueRotate(hue)
      .position(x, y)
      .addTo('body')
    
    setTimeout(() => {
      star.css('top', y + 200 + 'px')
      star.css('opacity', '0')
    }, 10)
    }
  }
  
  nn.on('mousemove', draw)
  nn.on('dblclick', () => {
    document.body.innerHTML =''
  })
</script>
